<!DOCTYPE html>
<html>
<head>
    <title>Log out</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }

        .logout-container {
            max-width: 400px;
            margin: 100px auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        h3 {
            color: #28a745;
            margin-bottom: 20px;
        }

        button {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <h3>User Successfully Logged Out</h3>
        <a href="{% url 'home' %}">
            <button type="button">Go Back</button>
        </a>
    </div>
</body>
</html>
