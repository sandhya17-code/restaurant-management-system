<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin: 30px 0;
            color: #444;
            font-size: 2.2rem;
            font-weight: bold;
        }

        .dish-card {
            border: 1px solid #ddd;
            padding: 16px;
            margin: 12px;
            display: inline-block;
            width: 220px;
            text-align: center;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 6px rgba(0,0,0,0.1);
        }

        .dish-card img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .dish-card h5 {
            margin: 10px 0;
            color: #333;
        }

        .dish-card p {
            margin: 5px 0;
            color: #555;
        }

        .dish-card button {
            background: #007bff;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .dish-card button:hover {
            background: #0056b3;
        }

        .quantity-controls {
            display: none;
            margin-top: 8px;
        }

        .quantity-controls button {
            background: #ff6600;
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .quantity-controls button:hover {
            background: #cc5200;
        }

        #proceed {
            display: none;
            margin: 20px auto;
            display: block;
            background: #28a745;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        #proceed:hover {
            background: #1e7e34;
        }
    </style>
</head>
<body>
    <h1>Our Menu</h1>
    <div>
        {% for dish in dishes %}
            <div class="dish-card">
                {% if dish.image %}
                    <img src="{{ dish.image.url }}" alt="{{ dish.name }}">
                {% endif %}
                <h5>{{ dish.name }}</h5>
                <p>{{ dish.description }}</p>
                <p>₹{{ dish.price }}</p>
                <button type="button" id="btn-{{dish.name}}" onclick="toggle(this,'{{dish.id}}','{{dish.name}}','{{dish.price}}')">Add to cart</button>
                <div class="quantity-controls">
                    <button onclick="changeQty('{{ dish.name }}','{{ dish.price }}', -1)">-</button>
                    <span id="qty-{{ dish.name }}">1</span>
                    <button onclick="changeQty('{{ dish.name }}', '{{ dish.price }}', 1)">+</button>
                </div>
            </div>
        {% endfor %}
    </div>
    <button id="proceed" onclick="goToOrder()">Proceed to Order</button>

    <script>
        let cart = [];

        function toggle(btn,dishId, name, price) {
            const qtyControls = btn.nextElementSibling;
            if (btn.innerText === "Add to cart") {
                btn.innerText = "Added";
                qtyControls.style.display = "block";
                cart.push({id: Number(dishId),name:name, price:Number(price), qty:1});
            } else {
                btn.innerText = "Add to cart";
                qtyControls.style.display = "none";
                cart = cart.filter(item => item.id !== Number(dishId));
            }
            document.getElementById("proceed").style.display = cart.length > 0 ? "block" : "none";
        }

        function changeQty(name, price, change) {
            let item = cart.find(i => i.name === name);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.name !== name);
                    document.getElementById(`qty-${name}`).innerText = 0;
                    const btn = document.getElementById(`btn-${name}`);
                    btn.innerText = "Add to cart";
                    btn.nextElementSibling.style.display = "none";
                } else {
                    document.getElementById(`qty-${name}`).innerText = item.qty;
                }
            }
            document.getElementById("proceed").style.display = cart.length > 0 ? "block" : "none";
        }

        function goToOrder(){
            localStorage.setItem("cart",JSON.stringify(cart));
            window.location.href = "{% url 'order' %}";
        }
    </script>
</body>
</html>
