<!DOCTYPE html>
<html>
<head>
    <title>Our Offers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #444;
            font-weight: bold;
        }

        .card {
            border-radius: 8px;
            box-shadow: 0 0 6px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card-img-top {
            height: 180px;
            object-fit: cover;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .card-title {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .card-text strong {
            color: #28a745;
            font-size: 1rem;
        }

        .badge {
            font-size: 0.9rem;
        }

        p {
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body class="container mt-4">

    <h2>Our Offers</h2>

    <div class="row">
        {% for offer in offers %}
            <div class="col-md-4 mb-3">
                <div class="card">
                    {% if offer.image %}
                        <img src="{{ offer.image.url }}" class="card-img-top" alt="{{ offer.name }}">
                    {% endif %}
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ offer.name }}</h5>
                        <p class="card-text">
                            <strong>{{ offer.percentage|floatformat:0 }}% OFF</strong><br>
                            Use Code: <span class="badge bg-primary">{{ offer.code }}</span>
                        </p>
                    </div>
                </div>
            </div>
        {% empty %}
            <p>No offers available right now.</p>
        {% endfor %}
    </div>

</body>
</html>
